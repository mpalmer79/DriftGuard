name: supply-chain

on:
  push:
    branches: [main]
  pull_request:
  # Re-scan weekly so freshly-published advisories surface even when
  # the tree is quiet.
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read

# We invoke trivy and syft as CLIs from their official GitHub releases
# rather than via third-party composite actions. The composite actions
# (aquasecurity/trivy-action, anchore/sbom-action) re-reference internal
# sub-actions by tag, and a yanked sub-action tag (e.g. setup-trivy@v0.2.2)
# breaks the whole job at "Prepare all required actions" before any code
# runs. Direct CLI installs are pinned to versions we control and stay
# stable across upstream tag churn.

jobs:
  sbom:
    name: sbom (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: backend, path: backend }
          - { name: frontend, path: frontend }
    env:
      SYFT_VERSION: "1.18.1"
    steps:
      # actions/checkout v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: install syft
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin syft
          syft --version

      - name: generate cyclonedx sbom
        run: |
          syft "${{ matrix.target.path }}" \
            --output "cyclonedx-json=sbom-${{ matrix.target.name }}.cdx.json"

      # actions/upload-artifact v4.4.3
      - name: upload sbom
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: sbom-${{ matrix.target.name }}
          path: sbom-${{ matrix.target.name }}.cdx.json
          retention-days: 30

  scan:
    name: trivy (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: backend, path: backend }
          - { name: frontend, path: frontend }
    steps:
      # actions/checkout v4.1.7
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      # Use trivy's official install script, which resolves the latest
      # release and picks the correct linux_amd64 asset. We deliberately
      # do *not* pin a version: this is a vulnerability scanner, and
      # weekly cron + per-PR runs benefit from a fresh CVE database. If
      # we ever need reproducibility, switch to a pinned tag once the
      # exact upstream release naming is verified.
      - name: install trivy
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh" \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: trivy filesystem scan
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            "${{ matrix.target.path }}"
